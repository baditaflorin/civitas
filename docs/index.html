<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Civitas turns leaked document dumps into searchable, analyzable, publishable evidence."
    />
    <title>Civitas</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f4ee;
        color: #17202a;
      }

      body {
        margin: 0;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      section {
        max-width: 880px;
      }

      h1 {
        font-size: clamp(48px, 8vw, 104px);
        line-height: 0.95;
        margin: 0 0 20px;
      }

      p {
        max-width: 680px;
        font-size: 20px;
        line-height: 1.5;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 32px;
      }

      a {
        color: #0b5cad;
        font-weight: 700;
      }

      .button {
        border: 1px solid #17202a;
        border-radius: 8px;
        padding: 12px 16px;
        text-decoration: none;
        color: #17202a;
        background: #fffdfa;
      }

      .version {
        margin-top: 28px;
        color: #58606b;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Civitas</h1>
        <p>
          The civic investigation OS for transforming leaked document dumps into
          searchable evidence, timelines, relationship maps, transcripts, and
          safer publishing exports.
        </p>
        <nav aria-label="Project links">
          <a class="button" href="https://github.com/baditaflorin/civitas">Star on GitHub</a>
          <a class="button" href="https://www.paypal.com/paypalme/florinbadita">Support via PayPal</a>
        </nav>
        <p class="version">Version 0.1.0 · Commit dev</p>
      </section>
    </main>
  </body>
</html>
