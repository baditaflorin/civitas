worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json escape=json
    '{ "time":"$time_iso8601", "remote_addr":"$remote_addr", "request":"$request",'
    ' "status":$status, "body_bytes_sent":$body_bytes_sent, "request_time":$request_time }';

  access_log /var/log/nginx/access.log json;
  error_log /var/log/nginx/error.log warn;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
  brotli on;
  brotli_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  map $http_origin $cors_origin {
    default "";
    "https://baditaflorin.github.io" "https://baditaflorin.github.io";
  }

  upstream civitas_app {
    server app:8080;
  }

  server {
    listen 80;
    server_name _;
    return 301 https://$host:25342$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/civitas/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/civitas/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://baditaflorin.github.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    if ($cors_origin != "") {
      add_header Access-Control-Allow-Origin $cors_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token" always;
    }

    location = /metrics {
      return 404;
    }

    location /api/ {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass http://civitas_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://civitas_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
